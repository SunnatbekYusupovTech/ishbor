services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:3000
      MONGO_URI: mongodb://mongo:27017/ishbor_portal
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      TEST_DURATION_MINUTES: 30
      HEARTBEAT_TIMEOUT_MS: 15000
      MAX_TAB_SWITCHES: 3
      # Uploaded images live on a named volume so they survive `docker compose
      # up --build` — the same persistence a Railway volume gives in prod.
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads-data:/app/uploads
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  mongo-data:
  uploads-data:

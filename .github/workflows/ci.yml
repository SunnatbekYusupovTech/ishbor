name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Cache the mongodb-memory-server binary so integration tests actually run.
      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-memory-server-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck -w backend

      - name: Test
        run: npm run test -w backend

      - name: Build
        run: npm run build -w backend

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Lint
        run: npm run lint -w frontend

      - name: Build
        run: npm run build -w frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
